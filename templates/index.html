<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Işık Hızında PDF Ayıklayıcı</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 10px; border: 1px solid #333; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; }
        input[type="file"], input[type="text"] { width: 100%; padding: 12px; margin-bottom: 25px; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; }
        button:hover { background: #2980b9; }
        button:disabled { background: #555; cursor: not-allowed; }
        .info { font-size: 12px; color: #888; margin-top: -20px; margin-bottom: 20px; display: block; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Süper Hızlı PDF Ayıklayıcı 🚀</h2>
        <p style="color: #2ecc71; font-size: 14px; font-weight: bold;">Cihaz İçi Mod: Dosyanız internete yüklenmez, saniyeler içinde telefonunuzda bitirilir.</p>
        
        <label>PDF Dosyası Seç:</label>
        <input type="file" id="pdfFile" accept=".pdf" required>
        
        <label>Kalmasını İstediğiniz Sayfalar:</label>
        <input type="text" id="pageRanges" placeholder="Örn: 20-50, 60, 70-80" required>
        <span class="info">Drive mantığıyla virgül ve tire kullanabilirsiniz.</span>
        
        <button id="processBtn" onclick="processPdf()">Sayfaları Ayıkla ve İndir</button>
        <div id="status"></div>
    </div>

    <script>
        async function processPdf() {
            const fileInput = document.getElementById('pdfFile');
            const rangeInput = document.getElementById('pageRanges').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('processBtn');

            if (!fileInput.files.length) {
                statusDiv.style.color = "#e74c3c";
                statusDiv.innerText = "Lütfen önce bir PDF dosyası seçin!";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Ayıklanıyor...";
            statusDiv.style.color = "#f1c40f";
            statusDiv.innerText = "İşlem cihazınızda yapılıyor, lütfen bekleyin...";

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                
                const { PDFDocument } = PDFLib;
                const srcDoc = await PDFDocument.load(arrayBuffer);
                const totalPages = srcDoc.getPageCount();
                
                const pagesToKeep = [];
                const parts = rangeInput.split(',');
                
                for (let part of parts) {
                    part = part.trim();
                    if (part.includes('-')) {
                        const [startStr, endStr] = part.split('-');
                        const start = parseInt(startStr);
                        const end = parseInt(endStr);
                        if (!isNaN(start) && !isNaN(end)) {
                            for (let i = start; i <= end; i++) {
                                if (i >= 1 && i <= totalPages) pagesToKeep.push(i - 1);
                            }
                        }
                    } else {
                        const page = parseInt(part);
                        if (!isNaN(page) && page >= 1 && page <= totalPages) pagesToKeep.push(page - 1);
                    }
                }

                if (pagesToKeep.length === 0) {
                    throw new Error("Geçerli bir sayfa aralığı bulunamadı!");
                }

                // Sayfaları sırala ve mükerrer kayıtları temizle
                const uniquePages = [...new Set(pagesToKeep)].sort((a, b) => a - b);

                const newDoc = await PDFDocument.create();
                const copiedPages = await newDoc.copyPages(srcDoc, uniquePages);
                copiedPages.forEach(page => newDoc.addPage(page));

                const pdfBytes = await newDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Ayiklanmis_" + file.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                statusDiv.style.color = "#2ecc71";
                statusDiv.innerText = "Başarılı! Yeni PDF anında indirildi.";
            } catch (err) {
                statusDiv.style.color = "#e74c3c";
                statusDiv.innerText = "Hata: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Sayfaları Ayıkla ve İndir";
            }
        }
    </script>
</body>
</html>
