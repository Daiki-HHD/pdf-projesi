<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınırsız PDF Ayıklayıcı</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 10px; border: 1px solid #333; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; }
        input[type="file"], input[type="text"] { width: 100%; padding: 12px; margin-bottom: 25px; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; }
        button { width: 100%; background: #2ecc71; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; }
        button:hover { background: #27ae60; }
        .info { font-size: 12px; color: #888; margin-top: -20px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PDF Sayfa Ayıklayıcı (1024 MB Limit)</h2>
        <p style="color: #aaa; font-size: 14px;">Yalnızca belirttiğiniz sayfalar tutulur, geri kalan tüm sayfalar silinir.</p>
        
        <form method="POST" enctype="multipart/form-data">
            <label>PDF Dosyası Yükle:</label>
            <input type="file" name="pdf_file" accept=".pdf" required>
            
            <label>Kalmasını (Kaydedilmesini) İstediğiniz Sayfalar:</label>
            <input type="text" name="pages" placeholder="Örn: 1-5, 8, 12-20" required>
            <span class="info">Yazdığınız sayfa aralıkları dışındaki her şey otomatik olarak silinecektir.</span>
            
            <button type="submit" onclick="this.innerText='İşleniyor, lütfen bekleyin...'">Sayfaları Ayıkla ve İndir</button>
        </form>
    </div>
</body>
</html>
